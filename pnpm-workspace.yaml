packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  argon2: set this to true or false
  es5-ext: set this to true or false
  esbuild: set this to true or false
  unrs-resolver: set this to true or false

# Approved native build scripts (required for argon2 password hashing,
# esbuild/tsx for the API dev server, etc). All four are well-known,
# audited packages. pnpm 11+ requires explicit approval for safety.
onlyBuiltDependencies:
  - argon2
  - es5-ext
  - esbuild
  - unrs-resolver
